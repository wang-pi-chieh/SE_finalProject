<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>瀏覽獎學金 - 獎學金助學系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": { "DEFAULT": "#0D57D9", "light": "#F0F5FF" },
                        "accent": "#f59e0b",
                        "background": { "light": "#F8F9FA", "dark": "#111827" },
                    },
                    fontFamily: { "sans": ["Public Sans", "Noto Sans TC", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        /* Custom Connector Styles */
        .connector-line {
            display: none;
        }

        .active-item .connector-line {
            display: block;
        }

        /* Entrance Animation for Content */
        .content-enter {
            animation: fadeSlideBlurIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Active Item Styling */
        .scholarship-item.active {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border-color: transparent;
            transform: translateX(8px);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3);
        }

        .scholarship-item.active p {
            color: rgba(255, 255, 255, 0.9);
        }

        .scholarship-item.active .icon-box {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .scholarship-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans text-[#111318] dark:text-white flex flex-col min-h-screen overflow-hidden">
    <!-- Header -->
    <script src="header.js?v=20251226_v4"></script>

    <main class="flex-1 max-w-[1400px] mx-auto w-full p-4 md:p-8 h-[calc(100vh-64px)]">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-20 h-full relative">

            <!-- SVG Overlay for Converging Connectors -->
            <svg id="connector-overlay" class="absolute inset-0 w-full h-full pointer-events-none z-0"
                style="overflow: visible;">
                <!-- Paths will be injected here via JS -->
            </svg>

            <!-- Left: Scholarship List (4 cols) -->
            <div class="lg:col-span-4 flex flex-col h-full relative z-10">
                <div class="mb-6">
                    <h1 class="text-3xl font-black tracking-tight mb-2">瀏覽獎學金</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">選擇右方獎學金以查看詳細資訊</p>
                </div>

                <!-- Scrollable List -->
                <div class="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar" id="scholarship-list">
                    <!-- Items injected via JS -->
                </div>
            </div>

            <!-- Right: Detail View (8 cols) -->
            <div class="lg:col-span-8 h-full relative flex flex-col justify-center">
                <!-- Connector Visual (Dashed Line) -->
                <div class="hidden lg:block absolute left-[-32px] top-1/2 -translate-y-1/2 pointer-events-none z-0">
                    <svg width="60" height="20" viewBox="0 0 60 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 10 H60" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 4"
                            class="opacity-0 transition-opacity duration-300" id="connector-svg" />
                        <circle cx="60" cy="10" r="4" fill="#f59e0b" class="opacity-0 transition-opacity duration-300"
                            id="connector-dot" />
                    </svg>
                </div>

                <!-- Detail Card -->
                <div id="detail-card"
                    class="glass-card w-full h-full max-h-[85vh] rounded-3xl p-8 border border-white/20 shadow-2xl relative overflow-y-auto custom-scrollbar content-enter bg-white/50 dark:bg-gray-800/50 backdrop-blur-xl">
                    <!-- Content injected via JS -->
                    <div class="h-full flex flex-col items-center justify-center text-center text-gray-400">
                        <span class="material-symbols-outlined text-6xl mb-4 opacity-30">manage_search</span>
                        <p>請從左側列表選擇一項獎學金</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Data & Script -->
    <script>
        const scholarships = [
            {
                id: 1,
                title: "優秀清寒校友獎學金",
                org: "國立高雄大學校友總會",
                amount: "$20,000",
                icon: "diversity_3",
                deadline: "2024-03-31",
                tags: ["清寒", "校友會", "成績優良"],
                desc: "由校友總會設立，旨在鼓勵家境清寒且學業成績優異之學生努力向學。",
                requirements: [
                    "家境清寒證明（低收、中低收或村里長證明）",
                    "學業平均 80 分以上",
                    "導師推薦信"
                ]
            },
            {
                id: 2,
                title: "資工系專屬獎學金",
                org: "資訊工程系",
                amount: "$10,000",
                icon: "code",
                deadline: "2024-04-15",
                tags: ["資工系限定", "成績優異"],
                desc: "鼓勵資訊工程系學生專注於專業課程學習與程式設計能力培養。",
                requirements: [
                    "限資工系學生",
                    "程式設計課程成績 A+ 以上",
                    "無不良紀錄"
                ]
            },
            {
                id: 3,
                title: "學術研究績優獎勵",
                org: "研發處",
                amount: "$30,000",
                icon: "science",
                deadline: "2024-05-20",
                tags: ["研究", "論文"],
                desc: "鼓勵大學部及研究生參與學術研究，發表高品質論文。",
                requirements: [
                    "以第一作者發表於 SCI/SSCI 期刊",
                    "指導教授推薦函",
                    "論文抽印本或接受函"
                ]
            },
            {
                id: 4,
                title: "海外交換學生獎學金",
                org: "國際事務處",
                amount: "$50,000",
                icon: "flight_takeoff",
                deadline: "2024-04-30",
                tags: ["交換", "語言"],
                desc: "補助本校學生赴海外姊妹校進行交換學習，拓展國際視野。",
                requirements: [
                    "已取得姊妹校交換學生資格",
                    "托福 iBT 80 分或雅思 6.0 以上",
                    "在校歷年成績排名前 20%"
                ]
            },
            {
                id: 5,
                title: "弱勢學生生活助學金",
                org: "生活輔導組",
                amount: "$6,000 / 月",
                icon: "support_agent",
                deadline: "2024-09-01",
                tags: ["生活補助", "服務學習"],
                desc: "提供弱勢學生生活津貼，需參與校內服務學習時數。",
                requirements: [
                    "符合相關弱勢條件",
                    "每週需服務 6 小時",
                    "前一學期成績達 60 分以上"
                ]
            }
        ];

        // Elements
        const listContainer = document.getElementById('scholarship-list');
        const detailCard = document.getElementById('detail-card');
        const connectorOverlay = document.getElementById('connector-overlay');
        let activeId = 1;

        // Initial setup
        // Initial setup
        renderList();
        selectScholarship(1);

        // Wait for next frame for connector calc
        requestAnimationFrame(() => {
            updateConnectors();
            window.addEventListener('resize', updateConnectors);
            listContainer.addEventListener('scroll', updateConnectors);
        });

        function renderList() {
            listContainer.innerHTML = scholarships.map(item => `
                <div onclick="selectScholarship(${item.id})" id="item-${item.id}" data-delay="0"
                    class="animate-on-scroll scholarship-item cursor-pointer p-4 rounded-xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-md flex items-center gap-4 group transition-all duration-300 relative">
                    <div class="icon-box size-12 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 flex items-center justify-center transition-colors">
                        <span class="material-symbols-outlined">${item.icon}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-sm truncate">${item.title}</h3>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${item.org}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold block">${item.amount}</span>
                        <!-- Small dot for connector start -->
                        <div class="connector-dot absolute right-[-6px] top-1/2 -translate-y-1/2 size-3 bg-gray-300 dark:bg-gray-600 rounded-full border-2 border-white dark:border-gray-900 transition-colors duration-300"></div>
                    </div>
                </div>
            `).join('');

            // Manually re-observe newly added elements since global.js runs once on load
            if (window.observer) {
                document.querySelectorAll('.animate-on-scroll').forEach(el => {
                    window.observer.observe(el);
                });
            }
        }

        function updateConnectors() {
            if (window.innerWidth < 1024) {
                connectorOverlay.innerHTML = '';
                return;
            }

            const containerRect = document.querySelector('main').getBoundingClientRect();
            const cardRect = detailCard.getBoundingClientRect();

            // Anchor point on the Right Card (Left edge, vertically centered)
            // Adjust coordinates to be relative to the SVG container (which fills main .grid or similar)
            // Actually, let's assume the SVG is absolute in the .grid container.
            // We need coords relative to that container.

            const gridContainer = listContainer.parentElement.parentElement;
            const gridRect = gridContainer.getBoundingClientRect();

            // Card Anchor (Relative to Grid)
            const targetX = (cardRect.left - gridRect.left); // Flush with card edge
            const targetY = (cardRect.top - gridRect.top) + (cardRect.height / 2);

            let svgContent = '';

            // Interactive "Target" dot on the right card
            svgContent += `<circle cx="${targetX}" cy="${targetY}" r="4" fill="#f59e0b" />`;

            scholarships.forEach(item => {
                const el = document.getElementById(`item-${item.id}`);
                if (!el) return;

                const rect = el.getBoundingClientRect();

                // If item is completely out of view, maybe don't draw?
                // But for "coolness", maybe fade them out. 
                // Let's draw all but clip logic handled by SVG bounds usually.

                // Item Anchor (Right edge, centered) with Math.round for crispness
                const startX = Math.round((rect.right - gridRect.left) + 6);
                const startY = Math.round((rect.top - gridRect.top) + (rect.height / 2));

                const isActive = (item.id === activeId);
                const color = isActive ? '#f59e0b' : (document.documentElement.classList.contains('dark') ? '#4b5563' : '#e5e7eb');
                const strokeWidth = isActive ? 2 : 1;
                const dashArray = isActive ? 'none' : '4 4';
                const opacity = isActive ? 1 : 0.3;

                // Bezier Curve
                // Control points: 
                // CP1: StartX + 50% distance
                // CP2: TargetX - 50% distance
                const deltaX = targetX - startX;
                const cp1x = startX + (deltaX * 0.5);
                const cp2x = targetX - (deltaX * 0.5);

                svgContent += `
                    <path d="M ${startX} ${startY} C ${cp1x} ${startY}, ${cp2x} ${targetY}, ${targetX} ${targetY}" 
                          stroke="${color}" 
                          stroke-width="${strokeWidth}" 
                          fill="none" 
                          stroke-dasharray="${dashArray}"
                          class="transition-all duration-300 ease-out"
                          style="opacity: ${opacity}"
                    />
                `;
            });

            connectorOverlay.innerHTML = svgContent;
        }

        function selectScholarship(id) {
            activeId = id;

            // Update Active State Classes
            document.querySelectorAll('.scholarship-item').forEach(el => {
                el.classList.remove('active', 'ring-2', 'ring-primary', 'bg-primary/5');
                el.querySelector('.connector-dot').classList.remove('bg-accent', 'scale-125');
            });

            const activeItem = document.getElementById(`item-${id}`);
            if (activeItem) {
                activeItem.classList.add('active');
                // Active Dot
                activeItem.querySelector('.connector-dot').classList.add('bg-accent', 'scale-125');
            }

            // Animate connectors during transition
            const startTime = performance.now();
            const duration = 400; // slightly longer than CSS transition

            function animateConnectors(currentTime) {
                updateConnectors();
                if (currentTime - startTime < duration) {
                    requestAnimationFrame(animateConnectors);
                }
            }
            requestAnimationFrame(animateConnectors);

            // Find Data
            const data = scholarships.find(s => s.id === id);

            // Animate Out -> In
            detailCard.classList.remove('content-enter');
            void detailCard.offsetWidth; // trigger reflow
            detailCard.classList.add('content-enter');

            // Inject Content
            detailCard.innerHTML = `
                <div class="flex flex-col h-full animate-on-scroll is-visible" style="animation-duration: 0.8s;">
                    <!-- Header -->
                    <div class="flex items-start justify-between mb-8">
                        <div>
                             <div class="inline-flex items-center gap-2 px-3 py-1 bg-primary/10 text-primary rounded-full text-xs font-bold mb-3">
                                <span class="material-symbols-outlined text-sm">${data.icon}</span>
                                ${data.org}
                            </div>
                            <h2 class="text-3xl md:text-4xl font-black text-[#111318] dark:text-white mb-2 leading-tight">${data.title}</h2>
                            <div class="flex items-center gap-4 text-sm text-gray-500 dark:text-gray-400">
                                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">calendar_today</span> 截止日期：${data.deadline}</span>
                                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">payments</span> 金額：${data.amount}</span>
                            </div>
                        </div>
                        <div class="hidden sm:block">
                            <span class="text-5xl opacity-10 material-symbols-outlined">verified</span>
                        </div>
                    </div>

                    <!-- Tags -->
                    <div class="flex flex-wrap gap-2 mb-8">
                        ${data.tags.map(tag => `<span class="px-3 py-1 rounded-lg bg-gray-100 dark:bg-gray-700 text-xs font-bold text-gray-600 dark:text-gray-300">#${tag}</span>`).join('')}
                    </div>

                    <!-- Description -->
                    <div class="prose dark:prose-invert max-w-none mb-8">
                        <h3 class="text-lg font-bold mb-3">申請說明</h3>
                        <p class="text-gray-600 dark:text-gray-300 leading-relaxed">${data.desc}</p>
                    </div>

                    <!-- Requirements -->
                    <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-6 border border-gray-100 dark:border-gray-700 mb-8">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">check_circle</span>
                            申請條件
                        </h3>
                        <ul class="space-y-3">
                            ${data.requirements.map(req => `
                                <li class="flex items-start gap-3">
                                    <div class="size-1.5 rounded-full bg-primary mt-2"></div>
                                    <span class="text-sm text-gray-600 dark:text-gray-300">${req}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <!-- CTA -->
                    <div class="mt-auto pt-6 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-3">
                        <button class="px-6 py-3 rounded-xl border border-gray-200 dark:border-gray-600 font-bold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                            檢視簡章
                        </button>
                        <button onclick="window.location.href='application-form.html'" class="px-6 py-3 rounded-xl bg-gradient-to-r from-primary to-blue-600 text-white font-bold shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 transition-all flex items-center gap-2">
                            立即申請
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </div>
            `;
        } // End selectScholarship

    </script>
    <script src="../global.js"></script>
</body>

</html>

<!DOCTYPE html>

<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>申請審核 - 獎助學金申請系統</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": {
                            "DEFAULT": "#0D57D9",
                            "light": "#F0F5FF"
                        },
                        "secondary": "#E5E7EB",
                        "background": {
                            "light": "#F8F9FA",
                            "dark": "#111827"
                        },
                        "card": {
                            "light": "#FFFFFF",
                            "dark": "#1F2937"
                        },
                        "text": {
                            "primary-light": "#111827",
                            "primary-dark": "#FFFFFF",
                            "secondary-light": "#6B7280",
                            "secondary-dark": "#9CA3AF"
                        },
                        "border": {
                            "light": "#E5E7EB",
                            "dark": "#374151"
                        }
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "Noto Sans TC", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Public Sans", "Noto Sans TC", sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-[#111318] dark:text-white flex flex-col min-h-screen overflow-x-hidden">
    <!-- Top Navigation -->
    <!-- Header injected by header.js -->
    <script src="header.js?v=20260620_lazy_widget"></script>
    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Heading -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-[#111318] dark:text-white text-3xl font-black leading-tight tracking-[-0.033em]">申請審核
                </h1>
                <p class="text-[#616f89] dark:text-gray-400 text-base font-normal mt-2">檢視、審核並追蹤學生獎助學金申請。</p>
            </div>

        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-6">
            <button id="tab-pending"
                class="tab-btn active px-4 py-2 text-sm font-medium text-primary border-b-2 border-primary focus:outline-none transition-colors"
                onclick="switchTab('pending')">
                待審核
            </button>
            <button id="tab-history"
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 border-b-2 border-transparent hover:border-gray-300 focus:outline-none transition-colors"
                onclick="switchTab('history')">
                審核紀錄
            </button>
            <button id="tab-disbursement"
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 border-b-2 border-transparent"
                onclick="switchTab('disbursement')">
                撥款管理
            </button>
            <button id="tab-final-awards"
                class="tab-btn px-4 py-2 text-sm font-medium text-gray-500 border-b-2 border-transparent"
                onclick="switchTab('final-awards')">
                最終名單
            </button>
        </div>
        <!-- Disbursement Tab Content -->
        <div id="tab-disbursement-content" class="hidden">

            <div class="bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm p-4">

                <h2 class="text-lg font-bold mb-4">撥款管理</h2>

                <table class="w-full text-left border-collapse">
                    <thead class="text-gray-500 text-sm">
                        <tr>
                            <th class="p-3">學生</th>
                            <th class="p-3">獎助項目</th>
                            <th class="p-3">金額</th>
                            <th class="p-3">狀態</th>
                            <th class="p-3 text-right">操作</th>
                        </tr>
                    </thead>

                    <tbody id="disbursement-table-body">
                        <tr>
                            <td colspan="5" class="p-4 text-center text-gray-400">
                                載入中...
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>
        <!-- Final Award List Tab Content -->
        <div id="tab-final-awards-content" class="hidden">
            <div class="bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm p-4">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                    <div>
                        <h2 class="text-lg font-bold">最終錄取名單</h2>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">依審查整合分數與獎助項目名額產生排名。</p>
                    </div>
                    <button id="confirm-final-awards-btn" type="button"
                        class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-bold hover:bg-blue-700 transition-colors">
                        確認目前名單
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-gray-500 text-sm">
                            <tr>
                                <th class="p-3">排名</th>
                                <th class="p-3">學生</th>
                                <th class="p-3">獎助項目</th>
                                <th class="p-3">整合分數</th>
                                <th class="p-3">結果</th>
                                <th class="p-3">確認狀態</th>
                            </tr>
                        </thead>
                        <tbody id="final-awards-table-body">
                            <tr>
                                <td colspan="6" class="p-4 text-center text-gray-400">載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!-- Filter & Table Section -->
        <div
            class="animate-on-scroll bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm flex flex-col overflow-hidden">
            <!-- Toolbar -->
            <div
                class="p-4 border-b border-[#e5e7eb] dark:border-[#2d3748] flex flex-col md:flex-row gap-4 justify-between items-center bg-gray-50/50 dark:bg-[#252f3e]/50">
                <div class="flex flex-1 w-full md:w-auto items-center gap-3">
                    <div class="relative w-full max-w-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span
                                class="material-symbols-outlined text-[#616f89] dark:text-gray-500 text-[20px]">search</span>
                        </div>
                        <input id="search-input"
                            class="pl-10 pr-4 py-2 w-full rounded-lg border border-[#dbdfe6] dark:border-[#3f4a5a] bg-white dark:bg-[#1e2634] text-[#111318] dark:text-white text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all shadow-sm"
                            placeholder="搜尋學生姓名或學號..." type="text" />
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end">
                    <select id="status-filter"
                        class="px-3 py-2 rounded-lg border border-[#dbdfe6] dark:border-[#3f4a5a] bg-white dark:bg-[#1e2634] text-[#111318] dark:text-white text-sm focus:ring-1 focus:ring-primary outline-none shadow-sm cursor-pointer">
                        <option value="all">所有狀態</option>
                        <option value="pending">待審核</option>
                        <option value="approved">已核准</option>
                        <option value="rejected">已駁回</option>
                        <option value="needs_action">需補件</option>
                    </select>
                    <select id="scholarship-filter"
                        class="px-3 py-2 rounded-lg border border-[#dbdfe6] dark:border-[#3f4a5a] bg-white dark:bg-[#1e2634] text-[#111318] dark:text-white text-sm focus:ring-1 focus:ring-primary outline-none shadow-sm cursor-pointer">
                        <option value="all">所有獎助項目</option>
                    </select>

                </div>
            </div>
            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-[#f9fafb] dark:bg-[#252f3e] text-[#616f89] dark:text-gray-400">
                        <tr>

                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">學生資料</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">獎助項目</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">申請日期</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">狀態</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="applications-table-body" class="divide-y divide-[#e5e7eb] dark:divide-[#2d3748]">
                        <!-- Content will be loaded by JS -->
                        <tr>
                            <td colspan="5" class="p-4 text-center text-gray-500">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div id="footer-pagination"
                class="p-4 border-t border-[#e5e7eb] dark:border-[#2d3748] flex flex-col sm:flex-row items-center justify-between gap-4">
                <!-- Loaded by JS -->
            </div>
        </div>
        </div>
    </main>
    <script src="../global.js"></script>
    <script src="applications.js?v=11"></script>
    <script src="js/disbursement.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>註冊 - 獎助學金申請系統</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "accent": "#f59e0b",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans TC", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        .login-bg {
            background-color: #101622;
            background-image:
                radial-gradient(at 0% 0%, rgba(19, 91, 236, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(245, 158, 11, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 91, 236, 0.3) 0px, transparent 50%);
        }

        /* Choices.js Custom Overrides to match premium look */
        .choices__inner {
            background-color: rgba(255, 255, 255, 0.5) !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 0.5rem !important;
            min-height: 44px !important;
            padding: 4px 10px 4px 40px !important;
            /* Added 40px left padding for icon */
            display: flex;
            align-items: center;
        }

        .dark .choices__inner {
            background-color: rgba(30, 41, 59, 0.5) !important;
            border-color: #334155 !important;
            color: white;
        }

        .choices__list--single {
            padding-left: 0 !important;
        }

        .choices.is-focused .choices__inner {
            border-color: #135bec !important;
            box-shadow: 0 0 0 2px rgba(19, 91, 236, 0.1) !important;
        }

        /* 確保系所下拉選單不會被下方的「立即註冊」按鈕蓋住 */
        .choices {
            position: relative;
            z-index: 30;
        }

        .choices__list--dropdown,
        .choices__list[aria-expanded] {
            z-index: 40;
        }

        /* 讓註冊按鈕的層級降低，避免壓在下拉選單上 */
        .btn-particle-effect {
            z-index: 0;
        }
    </style>
</head>

<body
    class="login-bg min-h-screen flex items-center justify-center font-display text-[#111318] dark:text-white relative overflow-x-hidden p-6">

    <!-- Floating Orbs Animation -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/30 rounded-full blur-3xl animate-float"
            style="animation-delay: 0s;"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-accent/20 rounded-full blur-3xl animate-float"
            style="animation-delay: -2s;"></div>
        <div class="absolute top-[40%] left-[20%] w-72 h-72 bg-purple-500/20 rounded-full blur-3xl animate-float"
            style="animation-delay: -4s;"></div>
    </div>

    <div class="relative z-10 w-full max-w-xl my-10">
        <div class="glass-card rounded-2xl p-8 shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <div class="flex items-center justify-center size-12 rounded-xl bg-primary/20 text-primary mx-auto mb-4 animate-on-scroll"
                    style="animation-delay: 0s;">
                    <span class="material-symbols-outlined text-3xl">how_to_reg</span>
                </div>
                <h1 class="text-2xl font-black tracking-tight mb-2 animate-text text-slate-900 dark:text-white"
                    style="animation-delay: 0.1s;">
                    建立新帳號</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm animate-on-scroll" style="animation-delay: 0.2s;">
                    加入獎助學金系統，開啟您的夢想旅程</p>
            </div>

            <form id="registerForm" class="space-y-5">
                <!-- Role (put first so other欄位可依身分變化) -->
                <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.3s;">
                    <label for="role" class="text-sm font-bold text-gray-700 dark:text-gray-300">身分別</label>
                    <div class="relative">
                        <select id="role"
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all appearance-none">
                            <option value="學生">學生</option>
                            <option value="老師">老師</option>
                            <option value="系統管理員">系統管理員</option>
                            <option value="獎助單位">獎助單位</option>
                        </select>
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">groups</span>
                    </div>
                </div>

                <!-- Username & Name / Unit Name Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.35s;">
                        <label for="username" class="text-sm font-bold text-gray-700 dark:text-gray-300">帳號
                            (學號/員工編號)</label>
                        <div class="relative">
                            <input type="text" id="username" required
                                class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                                placeholder="例: s113xxxx">
                            <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">person</span>
                        </div>
                    </div>
                    <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.4s;">
                        <label id="real_name_label" for="real_name"
                            class="text-sm font-bold text-gray-700 dark:text-gray-300">真實姓名</label>
                        <div class="relative">
                            <input type="text" id="real_name" required
                                class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                                placeholder="例: 王小明">
                            <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">badge</span>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.45s;">
                    <label for="password" class="text-sm font-bold text-gray-700 dark:text-gray-300">設定密碼</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                            placeholder="請設定您的登入密碼">
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">lock</span>
                    </div>
                </div>

                <!-- Department Row -->
                <div id="department_group" class="space-y-2 animate-on-scroll" style="animation-delay: 0.5s;">
                    <label for="department" class="text-sm font-bold text-gray-700 dark:text-gray-300">系所
                        (僅限師生)</label>
                    <div class="relative">
                        <select id="department"
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all">
                        </select>
                        <span
                            class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400 z-10 pointer-events-none">account_balance</span>
                    </div>
                </div>

                <!-- Contact Person (only for Scholarship Unit) -->
                <div id="contact_person_group" class="space-y-2 animate-on-scroll hidden" style="animation-delay: 0.52s;">
                    <label for="contact_person" class="text-sm font-bold text-gray-700 dark:text-gray-300">
                        聯絡人姓名 (僅限獎助單位)
                    </label>
                    <div class="relative">
                        <input type="text" id="contact_person"
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                            placeholder="例: 張小華">
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">support_agent</span>
                    </div>
                </div>

                <!-- Phone & Email Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2 animate-on-scroll" data-delay="550">
                        <label for="phone" class="text-sm font-bold text-gray-700 dark:text-gray-300">手機號碼</label>
                        <div class="relative">
                            <input type="text" id="phone"
                                class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                                placeholder="09xxxxxxxx">
                            <span
                                class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">phone_iphone</span>
                        </div>
                    </div>
                    <div class="space-y-2 animate-on-scroll" data-delay="550">
                        <label for="email" class="text-sm font-bold text-gray-700 dark:text-gray-300">電子信箱</label>
                        <div class="relative">
                            <input type="email" id="email"
                                class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                                placeholder="xxx@nuk.edu.tw">
                            <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">mail</span>
                        </div>
                    </div>
                </div>

                <button type="submit"
                    class="btn-particle-effect w-full h-12 rounded-xl text-white font-bold shadow-lg shadow-primary/30 flex items-center justify-center gap-2 group transition-all duration-300 relative animate-on-scroll mt-8"
                    style="animation-delay: 0.7s;">
                    <span>立即註冊</span>
                    <span
                        class="material-symbols-outlined group-hover:translate-x-1 transition-transform">person_add</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 text-center animate-on-scroll"
                style="animation-delay: 0.8s;">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    已經有帳號了？ <a href="login.html" class="text-primary font-bold hover:underline">點此登入</a>
                </p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html"
                class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                回到首頁
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="global.js"></script>
    <script>
        // Initialize Choices.js
        const departmentSelect = document.getElementById('department');
        const choices = new Choices(departmentSelect, {
            searchEnabled: true,
            itemSelectText: '',
            placeholder: true,
            placeholderValue: '請選擇系所',
            noResultsText: '找不到相符系所',
            shouldSort: false,
            shouldSortItems: false,
            position: 'top' // 讓下拉選單往上展開，避免被下方按鈕遮住
        });

        // Toggle contact person field & label based on role
        const roleSelect = document.getElementById('role');
        const contactGroup = document.getElementById('contact_person_group');
        const realNameLabel = document.getElementById('real_name_label');
        const realNameInput = document.getElementById('real_name');
        const deptGroup = document.getElementById('department_group');

        function updateRoleDependentFields() {
            const role = roleSelect.value;

            // 聯絡人欄位：只有獎助單位要填
            if (role === '獎助單位') {
                contactGroup.classList.remove('hidden');
            } else {
                contactGroup.classList.add('hidden');
            }

            // 真實姓名 / 獎助單位名稱 標題與範例
            if (role === '獎助單位') {
                realNameLabel.textContent = '獎助單位名稱';
                realNameInput.placeholder = '例: 資訊工程系專屬獎學金';
            } else {
                realNameLabel.textContent = '真實姓名';
                realNameInput.placeholder = '例: 王小明';
            }

            // 系所欄位：只有學生與老師需要顯示
            if (role === '學生' || role === '老師') {
                deptGroup.classList.remove('hidden');
            } else {
                deptGroup.classList.add('hidden');
                // 清空/重設系所選擇，避免驗證誤判
                try {
                    if (choices) {
                        choices.setChoiceByValue('NONE');
                    } else {
                        departmentSelect.value = '';
                    }
                } catch (e) {
                    departmentSelect.value = '';
                }
            }
        }

        roleSelect.addEventListener('change', updateRoleDependentFields);
        updateRoleDependentFields();

        // Load Departments
        fetch('api/get_departments.php')
            .then(res => res.json())
            .then(data => {
                const options = [
                    { value: 'NONE', label: '無 (不選擇系所)', selected: false },
                    ...data.map(dept => ({
                        value: dept.name,
                        label: dept.name
                    }))
                ];
                choices.setChoices(options, 'value', 'label', true);
            })
            .catch(err => console.error('Failed to load departments:', err));

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value.trim();
            const contactPerson = document.getElementById('contact_person') ? document.getElementById('contact_person').value.trim() : '';

            if ((role === '學生' || role === '老師') && (department === '' || department === 'NONE')) {
                alert('老師、學生須填寫系所！');
                return;
            }

            if ((role === '系統管理員' || role === '獎助單位') && department !== '' && department !== 'NONE') {
                alert('系所欄位僅限學生與老師填寫！請選無。');
                return;
            }

            if (role === '獎助單位' && contactPerson === '') {
                alert('獎助單位請填寫聯絡人姓名！');
                return;
            }

            const formData = {
                username: document.getElementById('username').value,
                real_name: document.getElementById('real_name').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                department: department,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                contact_person: contactPerson
            };

            fetch('api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
                .then(async response => {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        if (data.success) {
                            alert('註冊成功！將為您跳轉至登入頁面');
                            window.location.href = 'login.html';
                        } else {
                            alert('註冊失敗：' + data.message);
                        }
                    } catch (e) {
                        console.error('Server raw response:', text);
                        alert('伺服器回傳錯誤');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('連線失敗');
                });
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 - 獎助學金申請系統</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "accent": "#f59e0b",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Noto Sans TC", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific background for login to show off clips */
        .login-bg {
            background-color: #101622;
            background-image:
                radial-gradient(at 0% 0%, rgba(19, 91, 236, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(245, 158, 11, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 91, 236, 0.3) 0px, transparent 50%);
        }
    </style>
</head>

<body
    class="login-bg min-h-screen flex items-center justify-center font-display text-[#111318] dark:text-white relative overflow-hidden">

    <!-- Floating Orbs Animation -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/30 rounded-full blur-3xl animate-float"
            style="animation-delay: 0s;"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-accent/20 rounded-full blur-3xl animate-float"
            style="animation-delay: -2s;"></div>
        <div class="absolute top-[40%] left-[20%] w-72 h-72 bg-purple-500/20 rounded-full blur-3xl animate-float"
            style="animation-delay: -4s;"></div>
    </div>

    <!-- Entrance Animations Removed -->

    <div class="relative z-10 w-full max-w-md p-6">
        <div class="glass-card rounded-2xl p-8 shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <div class="flex items-center justify-center size-12 rounded-xl bg-primary/20 text-primary mx-auto mb-4 animate-on-scroll"
                    style="animation-delay: 0s;">
                    <span class="material-symbols-outlined text-3xl">school</span>
                </div>
                <h1 class="text-2xl font-black tracking-tight mb-2 animate-text text-slate-900 dark:text-white"
                    style="animation-delay: 0.1s;">
                    歡迎回來</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm animate-on-scroll" style="animation-delay: 0.2s;">
                    請輸入您的帳號密碼以登入系統</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.3s;">
                    <label for="email" class="text-sm font-bold text-gray-700 dark:text-gray-300">電子信箱 / 學號</label>
                    <div class="relative">
                        <input type="text" id="email" required
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                            placeholder="請輸入您的學號或 Email">
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">person</span>
                    </div>
                </div>

                <div class="space-y-2 animate-on-scroll" style="animation-delay: 0.4s;">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-sm font-bold text-gray-700 dark:text-gray-300">密碼</label>
                        <button type="button" id="forgot-password-link"
                            class="text-xs text-primary font-bold hover:underline">忘記密碼？</button>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full h-11 rounded-lg border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 focus:border-primary focus:ring-primary text-sm pl-10 transition-all"
                            placeholder="請輸入密碼">
                        <span class="material-symbols-outlined absolute left-3 top-2.5 text-gray-400">lock</span>
                    </div>
                </div>

                <button type="submit" id="login-submit-btn"
                    class="btn-particle-effect w-full h-12 rounded-xl text-white font-bold shadow-lg shadow-primary/30 flex items-center justify-center gap-2 group transition-all duration-300 relative animate-on-scroll"
                    style="animation-delay: 0.5s;">
                    <span id="login-submit-text">登入系統</span>
                    <span
                        class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </form>

            <!-- Forgot Password Modal -->
            <div id="forgot-password-modal"
                class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-3">重設密碼</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                        請輸入您的學號與註冊 Email，並設定新的密碼。
                    </p>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">學號</label>
                            <input type="text" id="fp_username"
                                class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">註冊
                                Email</label>
                            <input type="email" id="fp_email"
                                class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">新密碼</label>
                            <input type="password" id="fp_new_password"
                                class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">確認新密碼</label>
                            <input type="password" id="fp_confirm_password"
                                class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2 text-sm">
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" id="fp_cancel_btn"
                            class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800">
                            取消
                        </button>
                        <button type="button" id="fp_submit_btn"
                            class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-600">
                            確認重設
                        </button>
                    </div>
                </div>
            </div>

            <script>
                document.getElementById('loginForm').addEventListener('submit', function (e) {
                    e.preventDefault(); // 阻止表單直接送出

                    // 1. 抓取使用者輸入的資料
                    const usernameInput = document.getElementById('email').value; // 這裡雖然 ID 叫 email，但我們當作帳號用
                    const passwordInput = document.getElementById('password').value;
                    const submitBtn = document.getElementById('login-submit-btn');
                    const submitText = document.getElementById('login-submit-text');

                    const setLoginLoading = (isLoading) => {
                        if (submitBtn) submitBtn.disabled = isLoading;
                        if (submitBtn) submitBtn.classList.toggle('opacity-70', isLoading);
                        if (submitBtn) submitBtn.classList.toggle('cursor-wait', isLoading);
                        if (submitText) submitText.textContent = isLoading ? '登入中...' : '登入系統';
                    };

                    setLoginLoading(true);

                    // 2. 傳送給後端檢查
                    fetch('api/login.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: usernameInput,
                            password: passwordInput
                        })
                    })
                        .then(async response => {
                            const rawText = await response.text();
                            let payload;

                            try {
                                payload = rawText ? JSON.parse(rawText) : {};
                            } catch (parseError) {
                                throw new Error(`登入 API 回應格式錯誤（HTTP ${response.status}）：${rawText.slice(0, 120)}`);
                            }

                            if (!response.ok && response.status !== 401) {
                                throw new Error(payload.message || `登入 API 錯誤（HTTP ${response.status}）`);
                            }

                            return payload;
                        })
                        .then(data => {
                            if (data.success) {
                                alert('登入成功！你好，' + data.user.real_name);

                                // 儲存使用者資料到 LocalStorage
                                localStorage.setItem('user', JSON.stringify(data.user));

                                // 依照身分跳轉到不同頁面
                                const role = data.user.role;
                                if (role === '學生' || role === 'student') {
                                    window.location.replace('student/student-dashboard.html');
                                } else if (role === '老師' || role === 'teacher') {
                                    window.location.replace('teacher/teacher-dashboard.html?v=20260617_teacher_dashboard_fix');
                                } else if (role === '管理員' || role === '系管' || role === '系統管理員') {
                                    window.location.replace('admin/admin-dashboard.html');
                                } else if (role === '獎學金單位' || role === '獎助單位') {
                                    window.location.replace('reviewer/reviewer-dashboard.html');
                                } else {
                                    // 未知身分或預設
                                    window.location.replace('index.html');
                                }
                            } else {
                                setLoginLoading(false);
                                alert('登入失敗：' + data.message);
                            }
                        })
                        .catch(error => {
                            setLoginLoading(false);
                            console.error('Error:', error);
                            const isLocalHost = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
                            let msg = '連線錯誤。';

                            if (isLocalHost) {
                                msg += '\n請確認 XAMPP Apache 是否已啟動，並使用 http://localhost:8080/獎助學金申請系統/login.html 開啟。';
                            } else {
                                msg += '\n目前是在正式站台，請確認 Zeabur web / MySQL 服務與登入 API 狀態。';
                            }

                            msg += `\n錯誤內容：${error.message || error}`;
                            alert(msg);
                        });
                });

                // Forgot password logic
                const fpLink = document.getElementById('forgot-password-link');
                const fpModal = document.getElementById('forgot-password-modal');
                const fpCancel = document.getElementById('fp_cancel_btn');
                const fpSubmit = document.getElementById('fp_submit_btn');

                function openForgotPasswordModal() {
                    if (!fpModal) return;
                    fpModal.classList.remove('hidden');
                    fpModal.classList.add('flex');
                    document.getElementById('fp_username').value = '';
                    document.getElementById('fp_email').value = '';
                    document.getElementById('fp_new_password').value = '';
                    document.getElementById('fp_confirm_password').value = '';
                }

                function closeForgotPasswordModal() {
                    if (!fpModal) return;
                    fpModal.classList.add('hidden');
                    fpModal.classList.remove('flex');
                }

                if (fpLink) fpLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    openForgotPasswordModal();
                });
                if (fpCancel) fpCancel.addEventListener('click', closeForgotPasswordModal);

                if (fpSubmit) {
                    fpSubmit.addEventListener('click', () => {
                        const username = document.getElementById('fp_username').value.trim();
                        const email = document.getElementById('fp_email').value.trim();
                        const newPwd = document.getElementById('fp_new_password').value.trim();
                        const confirmPwd = document.getElementById('fp_confirm_password').value.trim();

                        if (!username || !email || !newPwd || !confirmPwd) {
                            alert('請完整填寫所有欄位');
                            return;
                        }
                        if (newPwd.length < 6) {
                            alert('新密碼長度至少需 6 碼');
                            return;
                        }
                        if (newPwd !== confirmPwd) {
                            alert('新密碼與確認密碼不一致');
                            return;
                        }

                        fetch('api/forgot_password.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: username,
                                email: email,
                                new_password: newPwd
                            })
                        })
                            .then(res => res.json())
                            .then(data => {
                                if (data.success) {
                                    alert('密碼已重設成功，請使用新密碼登入。');
                                    closeForgotPasswordModal();
                                } else {
                                    alert('重設失敗：' + (data.message || '未知錯誤'));
                                }
                            })
                            .catch(err => {
                                console.error('Forgot password error:', err);
                                alert('重設密碼時發生錯誤，請稍後再試。');
                            });
                    });
                }
            </script>

            <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 text-center animate-on-scroll"
                style="animation-delay: 0.6s;">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    還沒有帳號？ <a href="register.html" class="text-primary font-bold hover:underline">立即註冊</a>
                </p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html"
                class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                回到首頁
            </a>
        </div>
    </div>

    <script src="global.js"></script>
</body>

</html>

    <style>
        /* --- Choices.js Custom Styles --- */
        .choices {
            margin-bottom: 0;
            font-size: 14px;
            /* Adjust if needed */
            width: 100%;
            box-sizing: border-box;
        }

        .choices__inner {
            background-color: #fff;
            border: 1px solid #d1d5db;
            /* Tailwind gray-300 */
            border-radius: 0.5rem;
            /* Tailwind rounded-lg */
            padding: 7px 8px !important;
            min-height: auto;
            height: auto;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            width: 100% !important;
        }

        /* Dark mode support if possible, but keeping simple first */
        /* .dark .choices__inner { background-color: #1f2937; border-color: #4b5563; color: white; } */

        .choices__input {
            background-color: transparent;
            margin-bottom: 0;
            padding: 0 !important;
            height: auto !important;
            width: 100% !important;
        }

        .choices__list--single {
            padding: 0;
        }

        .choices.is-focused .choices__inner {
            border-color: #0D57D9;
            /* Primary color */
            box-shadow: 0 0 0 1px #0D57D9;
        }

        .choices[data-type*="select-one"]::after {
            border-color: #555 transparent transparent transparent;
            right: 15px;
            margin-top: -3px;
        }

        .choices__list--dropdown {
            border: 1px solid #d1d5db;
            border-top: none;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
            margin-top: -1px;
        }
    </style>
</head>

<body class="bg-[#F8F9FA] dark:bg-[#0b0d11] font-sans text-slate-900 dark:text-white min-h-screen flex flex-col">

            class="glass-card rounded-3xl overflow-hidden bg-white/70 dark:bg-gray-900/60 backdrop-blur-2xl shadow-xl border border-white/50 dark:border-white/10">

                    </div>
                    <div class="mb-2">

                <!-- Form Sections -->

                                    <span>••••••••</span>

                                </button>

                    <hr class="border-gray-200 dark:border-gray-700">

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                                <input type="text" id="class_name"

                    </div>

                    <hr class="border-gray-200 dark:border-gray-700">

                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                                <input type="email" id="email"
                                    class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary">
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">手機</label>
                                <input type="tel" id="phone"
                                    class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary">

    <!-- Change Password Modal -->
    <div id="change-password-modal"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4">變更密碼</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                為了安全起見，請輸入目前密碼以及新的密碼。
            </p>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">目前密碼</label>
                    <input type="password" id="old_password"
                        class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">新密碼</label>
                    <input type="password" id="new_password"
                        class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">確認新密碼</label>
                    <input type="password" id="confirm_password"
                        class="w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-primary focus:border-primary px-3 py-2">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button type="button" id="cancel-change-password-btn"
                    class="px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800">
                    取消
                </button>
                <button type="button" id="confirm-change-password-btn"
                    class="px-4 py-2 rounded-lg bg-primary text-white text-sm font-semibold hover:bg-blue-600">
                    確認變更
                </button>
            </div>
        </div>
    </div>

    <script src="student-dashboard.js"></script>
    <script src="../global.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Initialize Choices.js for Department ---
            const departmentSelect = document.getElementById('department');
            const choices = new Choices(departmentSelect, {
                searchEnabled: true,
                itemSelectText: '',
                placeholder: true,
                placeholderValue: '請選擇系所',
                noResultsText: '找不到相符的系所',
                shouldSort: false
            });

            // Load Department List
            fetch('../api/get_departments.php')
                .then(res => res.json())
                .then(data => {
                    const options = data.map(dept => ({
                        value: dept.name,
                        label: dept.name,
                        customProperties: { category: dept.category }
                    }));
                    choices.setChoices(options, 'value', 'label', true);
                })
                .catch(err => console.error('Failed to load departments:', err));
            // --------------------------------------------

            // 1. 從 LocalStorage 獲取登入使用者資訊
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                alert('請先登入');
                window.location.href = '../login.html';
                return;
            }
            const user = JSON.parse(storedUser);
            const currentUsername = user.username;

            // 2. 從後端獲取完整資料並填入表單
            fetch(`../api/get_student_profile.php?username=${currentUsername}`)
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        const data = result.data;
                        // 填入各個欄位
                        document.getElementById('username').value = data.username || '';
                        document.getElementById('role').value = data.role || '';
                        document.getElementById('real_name').value = data.real_name || '';

                        // Update Choices.js value
                        if (data.department) {
                            choices.setChoiceByValue(data.department);
                        }

                        document.getElementById('grade_level').value = data.grade_level || '';
                        document.getElementById('grade_level').value = data.grade_level || '';
                        document.getElementById('class_name').value = data.class_name || '';

                        document.getElementById('email').value = data.email || '';
                        document.getElementById('phone').value = data.phone || '';
                        document.getElementById('gender').value = data.gender || '男';
                        document.getElementById('address').value = data.address || '';

                        // 更新頁面標題區域
                        document.getElementById('profile-header-name').textContent = data.real_name || data.username;
                        document.getElementById('profile-header-username').textContent = data.username;

                        // 更新大頭貼
                        if (data.avatar_url) {
                            document.getElementById('avatar-img').src = '../' + data.avatar_url;
                        }
                    } else {
                        alert('無法載入個人資料：' + result.message);
                    }
                })
                .catch(err => console.error('Error fetching profile:', err));

            // 3. 儲存變更按鈕事件
            document.getElementById('save-btn').addEventListener('click', () => {
                const updatedData = {
                    username: currentUsername, // 識別用
                    real_name: document.getElementById('real_name').value,
                    department: document.getElementById('department').value,
                    grade_level: document.getElementById('grade_level').value,
                    class_name: document.getElementById('class_name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    gender: document.getElementById('gender').value,
                    address: document.getElementById('address').value
                };

                fetch('../api/update_student_profile.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                })
                    .then(res => res.json())
                    .then(result => {
                        if (result.success) {
                            alert('儲存成功！');
                            // 更新 localStorage 中的 user 資料 (例如姓名可能改了)
                            user.real_name = updatedData.real_name;
                            localStorage.setItem('user', JSON.stringify(user));
                        } else {
                            alert('儲存失敗：' + result.message);
                        }
                    })
                    .catch(err => {
                        console.error('Error saving profile:', err);
                        alert('存檔失敗。請確認您是用 XAMPP (localhost) 開啟網頁，而非 Live Server。');
                    });
            });

            // 4. 變更密碼邏輯
            const changePwdTrigger = document.getElementById('change-password-trigger');
            const changePwdModal = document.getElementById('change-password-modal');
            const cancelChangePwdBtn = document.getElementById('cancel-change-password-btn');
            const confirmChangePwdBtn = document.getElementById('confirm-change-password-btn');

            function openChangePasswordModal() {
                if (!changePwdModal) return;
                changePwdModal.classList.remove('hidden');
                changePwdModal.classList.add('flex');
                document.getElementById('old_password').value = '';
                document.getElementById('new_password').value = '';
                document.getElementById('confirm_password').value = '';
            }

            function closeChangePasswordModal() {
                if (!changePwdModal) return;
                changePwdModal.classList.add('hidden');
                changePwdModal.classList.remove('flex');
            }

            if (changePwdTrigger) {
                changePwdTrigger.addEventListener('click', openChangePasswordModal);
            }
            if (cancelChangePwdBtn) {
                cancelChangePwdBtn.addEventListener('click', closeChangePasswordModal);
            }

            if (confirmChangePwdBtn) {
                confirmChangePwdBtn.addEventListener('click', () => {
                    const oldPwd = document.getElementById('old_password').value.trim();
                    const newPwd = document.getElementById('new_password').value.trim();
                    const confirmPwd = document.getElementById('confirm_password').value.trim();

                    if (!oldPwd || !newPwd || !confirmPwd) {
                        alert('請完整填寫三個欄位。');
                        return;
                    }
                    if (newPwd.length < 6) {
                        alert('新密碼長度至少需 6 碼。');
                        return;
                    }
                    if (newPwd !== confirmPwd) {
                        alert('新密碼與確認新密碼不一致。');
                        return;
                    }

                    fetch('../api/change_password.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: currentUsername,
                            old_password: oldPwd,
                            new_password: newPwd
                        })
                    })
                        .then(res => res.json())
                        .then(result => {
                            if (result.success) {
                                alert('密碼變更成功！下次登入請使用新密碼。');
                                // 登出目前使用者並導向登入頁
                                localStorage.removeItem('user');
                                window.location.href = '../login.html';
                            } else {
                                alert('密碼變更失敗：' + (result.message || '未知錯誤'));
                            }
                        })
                        .catch(err => {
                            console.error('Error changing password:', err);
                            alert('密碼變更發生錯誤，請稍後再試。');
                        });
                });
            }

            // 5. 大頭貼上傳邏輯
            const avatarContainer = document.getElementById('avatar-container');
            const avatarInput = document.getElementById('avatar-upload');
            const avatarImg = document.getElementById('avatar-img');

            if (avatarContainer && avatarInput && avatarImg) {
                avatarContainer.addEventListener('click', () => {
                    avatarInput.click();
                });

                avatarInput.addEventListener('click', (e) => {
                    e.stopPropagation(); // 避免觸發 container 的 click
                });

                avatarInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const formData = new FormData();
                    formData.append('avatar', file);
                    formData.append('username', currentUsername);

                    // 預覽
                    const reader = new FileReader();
                    reader.onload = function (ev) {
                        avatarImg.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);

                    // 上傳
                    fetch('../api/upload_profile_picture.php', {
                        method: 'POST',
                        body: formData
                    })
                        .then(res => res.json())
                        .then(result => {
                            if (result.success) {
                                avatarImg.src = '../' + result.url.replace('../', ''); // 調整路徑
                            } else {
                                alert('大頭貼上傳失敗：' + result.message);
                            }
                        })
                        .catch(err => {
                            console.error('Error uploading avatar:', err);
                            alert('上傳發生錯誤');
                        });
                });
            }
        });
    </script>
</body>

    <script>
        // Flashlight logic (manual init to be safe)
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.flashlight-card');
            cards.forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--x', `${x}px`);
                    card.style.setProperty('--y', `${y}px`);
                };
            });
        });

        // Modal Logic
        const modal = document.getElementById('recommendation-modal');
        const modalPanel = document.getElementById('modal-panel');
        const modalBackdrop = document.getElementById('modal-backdrop');
        let currentApplicationId = null;
        let recommendationAutosave = null;

        function openModal(studentName, scholarshipName, applicationId, existingContent, existingFile) {
            console.log('Opening modal for App ID:', applicationId); // Debug
            currentApplicationId = applicationId;
            document.getElementById('modal-student-name').textContent = studentName;
            document.getElementById('modal-scholarship-name').textContent = scholarshipName;

            // Populate existing content if any
            document.getElementById('letter-content').value = existingContent || '';

            // Reset file input
            document.getElementById('file-upload').value = '';

            // Show existing file info if any
            const display = document.getElementById('file-name-display');
            if (existingFile) {
                // Should we show the filename? We only store path.
                // Let's just show "Existing file" or try to parse name.
                const fileName = existingFile.split('/').pop(); // Extract filename from path
                display.textContent = '撌脖??? ' + fileName;
                display.className = 'pl-1 text-primary font-medium';
            } else {
                display.textContent = '???暹?獢甇?;
                display.className = 'pl-1';
            }

            modal.classList.remove('hidden', 'pointer-events-none');
            // Small delay to allow display block to apply before opacity transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalPanel.classList.remove('scale-95', 'opacity-0');
                modalPanel.classList.add('scale-100', 'opacity-100');
            }, 10);

            if (recommendationAutosave) {
                recommendationAutosave.stop();
            }

            const form = document.getElementById('recommendation-letter-form');
            if (window.FormAutosave && form && currentApplicationId) {
                recommendationAutosave = window.FormAutosave.register(form, {
                    key: `teacher-recommendation:${currentApplicationId}`,
                    interval: 30000
                });
            }
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalPanel.classList.remove('scale-100', 'opacity-100');
            modalPanel.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden', 'pointer-events-none');
                currentApplicationId = null;
            }, 300);
        }

        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.textContent = '撌脤?? ' + input.files[0].name;
                display.className = 'pl-1 text-primary font-medium'; // Highlight color
            } else {
                display.textContent = '???暹?獢甇?;
                display.className = 'pl-1';
            }
        }

        async function saveDraft() {
            await submitLetterInternal('draft');
        }

        async function submitLetter() {
            await submitLetterInternal('submit');
        }

        async function submitLetterInternal(type) {
            const content = document.getElementById('letter-content').value;
            const fileInput = document.getElementById('file-upload');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!user) {
                alert('隢??餃');
                return;
            }
            if (!currentApplicationId) {
                alert('蝟餌絞?航炊嚗銝?唾?蝺刻? (ID null)');
                return;
            }

            // For draft, content can be empty? Let's say yes. But for submit no.
            if (type === 'submit' && !content.trim()) {
                alert('隢撓?交?血摰?);
                return;
            }

            const formData = new FormData();
            formData.append('teacher_username', user.username);
            formData.append('application_id', currentApplicationId);
            formData.append('content', content);
            formData.append('type', type);

            if (fileInput.files.length > 0) {
                formData.append('file-upload', fileInput.files[0]);
            }

            try {
                const res = await fetch('../api/submit_recommendation.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    recommendationAutosave?.clear();
                    const msg = type === 'submit' ? '?刻靽∪歇???漱嚗? : '?阮撌脣摮?';
                    alert(msg);
                    closeModal();
                    location.reload();
                } else {
                    alert('憭望?嚗? + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('?潛??航炊嚗? + err.message);
            }
        }

        modalBackdrop.addEventListener('click', closeModal);

        // Fetch Requests Logic
        let allRequests = [];
        let filteredRequests = [];
        let currentPage = 1;
        const pageSize = 6;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) location.href = '../login.html';

            // Set up event listeners
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1;
                filterAndRender();
            });
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentPage = 1;
                filterAndRender();
            });

            const tbody = document.getElementById('recommendation-list');

            try {
                const apiUrl = `../api/get_recommendation_requests.php?teacher_username=${user.username}`;
                const res = await fetch(apiUrl);
                const result = await res.json();

                if (result.success) {
                    allRequests = result.data;
                    updateStats();
                    filterAndRender();
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">?桀?瘝??刻靽∟?瘙?/td></tr>';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-red-500">頛憭望?嚗?蝔??岫??/td></tr>';
            }
        });

        function updateStats() {
            let countUnreviewed = 0;
            let countDraft = 0;
            let countSubmitted = 0;

            allRequests.forEach(req => {
                let s = req.letter_status;
                if (!s) s = '0';
                if (s === 'submitted') s = '1';
                if (s === 'draft') s = '2';

                if (s == '1') countSubmitted++;
                else if (s == '2') countDraft++;
                else countUnreviewed++;
            });

            document.getElementById('stat-unreviewed').textContent = countUnreviewed;
            document.getElementById('stat-draft').textContent = countDraft;
            document.getElementById('stat-submitted').textContent = countSubmitted;
        }

        function filterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const statusFilter = document.getElementById('statusFilter').value;

            filteredRequests = allRequests.filter(req => {
                // Status Logic
                let s = req.letter_status;
                if (!s) s = '0';
                if (s === 'submitted') s = '1';
                if (s === 'draft') s = '2';

                // Status Match
                let statusMatch = (statusFilter === 'all') || (s == statusFilter);

                // Search Match (Student Name)
                let searchMatch = !searchTerm || req.student_name.toLowerCase().includes(searchTerm);

                return statusMatch && searchMatch;
            });

            renderTable();
            renderPagination();
        }

        function renderTable() {
            const tbody = document.getElementById('recommendation-list');
            tbody.innerHTML = '';

            if (filteredRequests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">瘝?蝚血?璇辣????/td></tr>';
                document.getElementById('pagination-footer').classList.add('hidden');
                return;
            }

            document.getElementById('pagination-footer').classList.remove('hidden');

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = Math.min(startIndex + pageSize, filteredRequests.length);
            const pageItems = filteredRequests.slice(startIndex, endIndex);

            pageItems.forEach(req => {
                // Status Logic for Display
                let currentStatus = req.letter_status;
                if (!currentStatus) currentStatus = '0';
                if (currentStatus === 'submitted') currentStatus = '1';
                if (currentStatus === 'draft') currentStatus = '2';

                let displayStatus = '?芸祟??;
                let statusColor = 'bg-orange-100 text-orange-800';

                if (currentStatus == '1') {
                    displayStatus = '撌脫?鈭?;
                    statusColor = 'bg-green-100 text-green-800';
                } else if (currentStatus == '2') {
                    displayStatus = '敺撖?(?阮)';
                    statusColor = 'bg-blue-100 text-blue-800';
                } else {
                    displayStatus = '?芸祟??;
                    statusColor = 'bg-gray-100 text-gray-800';
                }

                const statusHtml = `<span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor}">${displayStatus}</span>`;

                // Action Button
                const safeContent = req.letter_content ? req.letter_content.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n') : '';
                const safeFile = req.letter_file_path || '';
                let actionBtn = '';

                // ?唾?獢辣?臬撌脤?嚗pp_status = 1嚗?
                const appStatus = parseInt(req.app_status, 10);
                const isApplicationApproved = appStatus === 1;

                if (currentStatus == '1') {
                    if (isApplicationApproved) {

        function renderPagination() {
            const totalItems = filteredRequests.length;
            const totalPages = Math.ceil(totalItems / pageSize);
            const startIndex = (currentPage - 1) * pageSize + 1;
            const endIndex = Math.min(currentPage * pageSize, totalItems);

            // Update info text
            const infoHtml = `憿舐內蝚?<span class="font-medium text-gray-900 dark:text-gray-200">${totalItems > 0 ? startIndex : 0}</span> ??<span class="font-medium text-gray-900 dark:text-gray-200">${endIndex}</span> 蝑???<span class="font-medium text-gray-900 dark:text-gray-200">${totalItems}</span> 蝑;
            document.getElementById('pagination-info').innerHTML = infoHtml;

            // Generate buttons
            const controls = document.getElementById('pagination-controls');
            controls.innerHTML = '';

            if (totalPages <= 1) return;

            // Prev Button
            const prevBtn = document.createElement('button');
            prevBtn.className = `px-2 py-1 rounded border ${currentPage === 1 ? 'opacity-50 cursor-not-allowed border-gray-200' : 'hover:bg-gray-50 border-gray-300'}`;
            prevBtn.innerHTML = '<span class="material-symbols-outlined text-sm">chevron_left</span>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderTable(); renderPagination(); } };
            controls.appendChild(prevBtn);

            // Page Numbers
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                const isActive = i === currentPage;
                btn.className = `px-3 py-1 rounded text-sm font-medium transition-colors ${isActive ? 'bg-primary text-white border border-primary' : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50'}`;
                btn.textContent = i;
                btn.onclick = () => { currentPage = i; renderTable(); renderPagination(); };
                controls.appendChild(btn);
            }

            // Next Button
            const nextBtn = document.createElement('button');
            nextBtn.className = `px-2 py-1 rounded border ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed border-gray-200' : 'hover:bg-gray-50 border-gray-300'}`;
            nextBtn.innerHTML = '<span class="material-symbols-outlined text-sm">chevron_right</span>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderTable(); renderPagination(); } };
            controls.appendChild(nextBtn);
        }
    </script>

    <script>
        // Grade Data Mock
        const gradeData = {
            'default': [
                { term: '111-1', score: 85.0, gpa: 3.8, rank: '5/50' },
                { term: '111-2', score: 87.5, gpa: 4.0, rank: '3/50' }
            ]
        };

        function openGradeModal(id, name, scholarship) {
            const modal = document.getElementById('gradeModal');
            const content = document.getElementById('gradeModalContent');
            const nameEl = document.getElementById('gradeModalName');
            const idEl = document.getElementById('gradeModalId');
            const scholarshipEl = document.getElementById('gradeModalScholarship');
            const tbody = document.getElementById('gradeTableBody');

            // Set Header
            nameEl.textContent = name;
            idEl.textContent = id;
            scholarshipEl.textContent = scholarship;

            // Populate Table
            tbody.innerHTML = '';
            const data = gradeData[id] || gradeData['default'];
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors';
                tr.innerHTML = `
                    <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">${row.term}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-300 font-bold ${row.score >= 90 ? 'text-green-600 dark:text-green-400' : ''}">${row.score}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-300">${row.gpa}</td>
                    <td class="px-4 py-3 text-gray-600 dark:text-gray-300 hover:text-primary cursor-help" title="?函鈭箸: ${row.rank.split('/')[1]}">${row.rank}</td>
                `;
                tbody.appendChild(tr);
            });

            // Show Modal
            modal.classList.remove('hidden');
            // Animate in
            requestAnimationFrame(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            });
        }

        function closeGradeModal() {
            const modal = document.getElementById('gradeModal');
            const content = document.getElementById('gradeModalContent');

            // Animate out
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>學生成績 - 獎學金助學系統</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": { "DEFAULT": "#0D57D9", "light": "#F0F5FF" },
                        "secondary": "#E5E7EB",
                        "background": { "light": "#F8F9FA", "dark": "#111827" },
                        "card": { "light": "#FFFFFF", "dark": "#1F2937" },
                        "text": {
                            "primary-light": "#111827",
                            "primary-dark": "#FFFFFF",
                            "secondary-light": "#6B7280",
                            "secondary-dark": "#9CA3AF"
                        },
                        "border": { "light": "#E5E7EB", "dark": "#374151" }
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "Noto Sans TC", "sans-serif"],
                        "display": ["Public Sans", "Noto Sans TC", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Public Sans", "Noto Sans TC", sans-serif;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-[#111318] dark:text-white flex flex-col min-h-screen font-sans">
    <script src="header.js?v=20260622_grade_page"></script>

    <main class="flex-1 w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8"></main>

    <script src="../global.js?v=1716300000"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                window.location.href = '../login.html';
                return;
            }

            try {
                const user = JSON.parse(storedUser);
                if (user.role !== '老師') {
                    alert('權限不足');
                    window.location.href = '../index.html';
                }
            } catch (error) {
                window.location.href = '../login.html';
            }
        });
    </script>
    <script src="js/mentor-students.js?v=4"></script>
</body>

</html>

<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>學生查詢 - 獎學金助學系統</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": { "DEFAULT": "#0D57D9", "light": "#F0F5FF" },
                        "secondary": "#E5E7EB",
                        "background": { "light": "#F8F9FA", "dark": "#111827" },
                        "card": { "light": "#FFFFFF", "dark": "#1F2937" },
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "Noto Sans TC", "sans-serif"],
                        "display": ["Public Sans", "Noto Sans TC", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: "Public Sans", "Noto Sans TC", sans-serif;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-[#111318] dark:text-white flex flex-col min-h-screen font-sans">
    <!-- Header injected by header.js -->
    <script src="header.js?v=20260620_lazy_widget"></script>

    <main class="flex-1 w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Heading -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-[#111318] dark:text-white text-3xl font-black leading-tight tracking-[-0.033em]">學生查詢
                </h1>
                <p id="dept-info" class="text-[#616f89] dark:text-gray-400 text-sm font-normal mt-1">載入中...</p>
            </div>
        </div>

        <!-- Student List -->
        <div
            class="bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm flex flex-col overflow-hidden">
            <!-- Toolbar -->
            <div
                class="p-4 border-b border-[#e5e7eb] dark:border-[#2d3748] flex flex-col md:flex-row gap-4 justify-between items-center bg-gray-50/50 dark:bg-[#252f3e]/50">
                <div class="relative w-full max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span
                            class="material-symbols-outlined text-[#616f89] dark:text-gray-500 text-[20px]">search</span>
                    </div>
                    <input id="student-search"
                        class="pl-10 pr-4 py-2 w-full rounded-lg border border-[#dbdfe6] dark:border-[#3f4a5a] bg-white dark:bg-[#1e2634] text-[#111318] dark:text-white text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all shadow-sm"
                        placeholder="搜尋學生姓名、學號或班級" type="text" />
                </div>
                <div class="text-sm text-gray-500 dark:text-gray-400">
                    共 <span id="student-count" class="font-bold text-[#111318] dark:text-white">0</span> 位學生
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-[#f9fafb] dark:bg-[#252f3e] text-[#616f89] dark:text-gray-400">
                        <tr>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">學生姓名/學號</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">班級/年級</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">Email</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-right">詳細資料</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-[#e5e7eb] dark:divide-[#2d3748]" id="student-table-body">
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-500">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination (Optional, simplified for now) -->
            <div
                class="p-4 border-t border-[#e5e7eb] dark:border-[#2d3748] flex items-center justify-center text-xs text-gray-500">
                顯示所有符合條件的學生
            </div>
        </div>
    </main>

    <!-- Student Detail Modal -->
    <div id="student-detail-modal" class="fixed inset-0 z-[9998] hidden" aria-labelledby="student-detail-title"
        role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm" onclick="closeStudentDetailModal()"></div>
        <div class="fixed inset-0 z-[10001] w-screen overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <div
                    class="relative transform overflow-hidden rounded-2xl bg-white dark:bg-[#1e2634] text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
                    <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-gray-100 dark:border-gray-700">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex items-center gap-3">
                                <div
                                    class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary">
                                    <span class="material-symbols-outlined">person_search</span>
                                </div>
                                <div>
                                    <h3 id="student-detail-title"
                                        class="text-base font-semibold leading-6 text-gray-900 dark:text-white">
                                        學生註冊資料
                                    </h3>
                                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                                        帳號：<span id="detail-student-username"
                                            class="font-medium text-gray-900 dark:text-gray-100"></span>
                                    </p>
                                </div>
                            </div>
                            <button type="button" onclick="closeStudentDetailModal()"
                                class="p-2 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-700 transition-colors">
                                <span class="material-symbols-outlined text-xl">close</span>
                            </button>
                        </div>
                    </div>
                    <div id="student-detail-body"
                        class="px-4 py-5 sm:p-6 space-y-2 text-sm text-gray-700 dark:text-gray-200">
                        載入中...
                    </div>
                    <div
                        class="bg-gray-50 dark:bg-[#252f3e]/50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 border-t border-gray-100 dark:border-gray-700">
                        <button type="button" onclick="closeStudentDetailModal()"
                            class="inline-flex w-full justify-center rounded-md bg-primary px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary/90 sm:ml-3 sm:w-auto">
                            關閉
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../global.js?v=1716300000"></script>
    <script src="js/mentor-students.js?v=4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) {
                window.location.href = '../login.html';
                return;
            }
            const user = JSON.parse(storedUser);
            if (user.role !== '老師') {
                alert('權限不足');
                window.location.href = '../index.html';
                return;
            }

            // Fetch Students
            try {
                const res = await fetch(`../api/get_department_students.php?teacher_username=${user.username}`);
                const data = await res.json();

                if (data.success) {
                    document.getElementById('dept-info').innerHTML = `系所：<span class="font-bold text-primary">${data.department}</span> | 學生列表`;
                    renderTable(data.data);
                    setupSearch(data.data);
                } else {
                    document.getElementById('dept-info').textContent = '載入失敗';
                    document.getElementById('student-table-body').innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">${data.message || '無法取得資料'}</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('student-table-body').innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">連線錯誤</td></tr>`;
            }
        });

        function renderTable(students) {
            const tbody = document.getElementById('student-table-body');
            const countEl = document.getElementById('student-count');
            tbody.innerHTML = '';
            countEl.textContent = students.length;

            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">目前該系所沒有學生資料</td></tr>';
                return;
            }

            students.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 dark:hover:bg-[#2a3441] transition-colors border-b border-gray-100 dark:border-gray-800';

                const gradeText = s.grade_level ? `${s.grade_level}年級` : '';
                const classText = s.class_name ? `${s.class_name}` : '';
                const fullClass = [gradeText, classText].filter(Boolean).join(' / ') || '-';

                const safeUsername = (s.username || '').replace(/'/g, "\\'");

                tr.innerHTML = `
                    <td class="p-4">
                        <p class="text-[#111318] dark:text-white font-bold text-sm">${s.real_name || '未命名'}</p>
                        <p class="text-[#616f89] dark:text-gray-500 text-xs">${s.username}</p>
                    </td>
                    <td class="p-4 text-sm text-[#111318] dark:text-white">${fullClass}</td>
                    <td class="p-4 text-sm text-[#616f89] dark:text-gray-400">${s.email || '-'}</td>
                    <td class="p-4 text-sm text-right">
                        <button onclick="openStudentDetailModal('${safeUsername}')"
                            class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg border border-[#d1d5db] dark:border-gray-600 text-xs font-medium text-[#111318] dark:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                            <span class="material-symbols-outlined text-[16px]">visibility</span>
                            檢視
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function setupSearch(allStudents) {
            const input = document.getElementById('student-search');
            input.addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                const filtered = allStudents.filter(s => {
                    const matchName = (s.real_name || '').toLowerCase().includes(q);
                    const matchId = (s.username || '').toLowerCase().includes(q);
                    const matchClass = (s.class_name || '').toLowerCase().includes(q);
                    return matchName || matchId || matchClass;
                });
                renderTable(filtered);
            });
        }

        async function openStudentDetailModal(username) {
            const modal = document.getElementById('student-detail-modal');
            const body = document.getElementById('student-detail-body');
            const usernameSpan = document.getElementById('detail-student-username');

            usernameSpan.textContent = username;
            body.textContent = '載入中...';
            modal.classList.remove('hidden');

            try {
                const res = await fetch(`../api/get_user_details.php?username=${encodeURIComponent(username)}`);
                const result = await res.json();

                if (!result.success) {
                    body.textContent = result.message || '載入失敗';
                    return;
                }

                const u = result.data || {};
                const rows = [];

                rows.push({ label: '姓名', value: u.real_name || '-' });
                rows.push({ label: '身分別', value: u.role || '-' });
                if (u.department) rows.push({ label: '系所', value: u.department });
                if (u.phone) rows.push({ label: '手機號碼', value: u.phone });
                if (u.email) rows.push({ label: '電子信箱', value: u.email });

                body.innerHTML = rows.map(r => `
                    <div class="flex justify-between items-center py-1">
                        <span class="text-xs text-gray-500 dark:text-gray-400">${r.label}</span>
                        <span class="text-sm font-medium text-gray-900 dark:text-gray-100">${r.value}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                body.textContent = '系統錯誤，請稍後再試。';
            }
        }

        function closeStudentDetailModal() {
            document.getElementById('student-detail-modal').classList.add('hidden');
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>系統設定 - 獎學金助學系統</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;family=Noto+Sans+TC:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <style>
        body {
            font-family: "Public Sans", "Noto Sans TC", sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": { "DEFAULT": "#0D57D9", "light": "#F0F5FF" },
                        "secondary": "#E5E7EB",
                        "background": { "light": "#F8F9FA", "dark": "#111827" },
                        "card": { "light": "#FFFFFF", "dark": "#1F2937" },
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "Noto Sans TC", "sans-serif"],
                    },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-[#111318] dark:text-white flex flex-col min-h-screen overflow-x-hidden">
    <!-- Top Navigation -->
    <script src="header.js?v=20251230_v1"></script>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Heading -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-[#111318] dark:text-white text-3xl font-black leading-tight tracking-[-0.033em]">系統管理
                </h1>
                <h2 class="text-2xl font-bold text-[#111318] dark:text-white mt-2 flex items-center gap-2">
                    系統設定 <span class="text-2xl">⚙️</span>
                </h2>
                <p class="text-[#616f89] dark:text-gray-400 text-sm font-normal mt-1">管理獎學金項目、期限與公告</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openAddModal()"
                    class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-[20px]">add_circle</span>
                    新增獎學金
                </button>
            </div>
        </div>

        <!-- Scholarship Import / Export -->
        <section
            class="mb-6 bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm overflow-hidden">
            <div class="p-6 border-b border-[#e5e7eb] dark:border-[#2d3748]">
                <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
                    <div>
                        <h3 class="text-[#111318] dark:text-white text-lg font-bold">獎學金資料匯入 / 匯出</h3>
                        <p class="text-[#616f89] dark:text-gray-400 text-sm mt-1">
                            CSV 必填欄位：name、provider_username、amount、quota、application_end_date。
                        </p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button id="scholarship-template-btn" type="button"
                            class="inline-flex items-center gap-2 px-3 py-2 rounded-md border border-gray-200 dark:border-gray-700 text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-800">
                            <span class="material-symbols-outlined text-[18px]">description</span>
                            下載範本
                        </button>
                        <button id="scholarship-export-csv-btn" type="button"
                            class="inline-flex items-center gap-2 px-3 py-2 rounded-md border border-gray-200 dark:border-gray-700 text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-800">
                            <span class="material-symbols-outlined text-[18px]">download</span>
                            匯出 CSV
                        </button>
                    </div>
                </div>

                <div class="mt-5 grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_280px] gap-5">
                    <div>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <input id="scholarship-import-file" type="file" accept=".csv,text/csv"
                                class="block w-full rounded-md border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm file:mr-3 file:border-0 file:bg-primary file:px-3 file:py-2 file:text-white file:font-semibold">
                            <button id="scholarship-import-preview-btn" type="button"
                                class="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-md bg-primary text-white text-sm font-bold hover:bg-primary/90">
                                <span class="material-symbols-outlined text-[18px]">fact_check</span>
                                預覽匯入
                            </button>
                        </div>
                        <label class="mt-3 inline-flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
                            <input id="scholarship-import-announcement" type="checkbox"
                                class="rounded border-gray-300 text-primary focus:ring-primary">
                            匯入完成後同步建立首頁公告
                        </label>
                        <div id="scholarship-import-status" class="hidden"></div>
                        <div id="scholarship-import-preview"></div>
                        <div class="mt-4">
                            <button id="scholarship-import-confirm-btn" type="button"
                                class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-green-600 text-white text-sm font-bold hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed">
                                <span class="material-symbols-outlined text-[18px]">upload</span>
                                確認匯入有效資料
                            </button>
                        </div>
                    </div>
                    <aside class="rounded-lg border border-gray-200 dark:border-gray-700 p-4">
                        <h4 class="text-sm font-bold text-gray-900 dark:text-white">最近匯入紀錄</h4>
                        <div id="scholarship-import-history" class="mt-2">
                            <p class="text-sm text-gray-500">載入中...</p>
                        </div>
                    </aside>
                </div>
            </div>
        </section>

        <!-- Scholarship List Card -->
        <div
            class="bg-white dark:bg-[#1e2634] rounded-xl border border-[#e5e7eb] dark:border-[#2d3748] shadow-sm flex flex-col overflow-hidden">
            <div class="p-6 border-b border-[#e5e7eb] dark:border-[#2d3748] flex justify-between items-center">
                <h3 class="text-[#111318] dark:text-white text-lg font-bold">獎學金項目列表</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-[#f9fafb] dark:bg-[#252f3e] text-[#616f89] dark:text-gray-400">
                        <tr>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">ID</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">獎學金名稱</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">金額</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">名額</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">獎助單位</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">申請條件 / 說明</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider">截止日期</th>
                            <th class="p-4 text-xs font-semibold uppercase tracking-wider text-right">操作</th>
                        </tr>
                    </thead>
                    </thead>
                    <tbody id="scholarship-table-body" class="divide-y divide-[#e5e7eb] dark:divide-[#2d3748]">
                        <!-- JS renders rows here -->
                    </tbody>
                </table>
            </div>
            <!-- Pagination Controls -->
            <div id="pagination-controls"
                class="p-4 border-t border-[#e5e7eb] dark:border-[#2d3748] flex justify-center items-center gap-2">
                <!-- JS renders buttons here -->
            </div>
        </div>
    </main>
    <!-- Add Scholarship Modal -->
    <div id="add-modal" class="fixed inset-0 z-[9999] hidden" aria-labelledby="modal-title" role="dialog"
        aria-modal="true">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity backdrop-blur-sm"
            onclick="closeAddModal()"></div>
        <div class="fixed inset-0 z-[10000] w-screen overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <div
                    class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
                    <div class="bg-white dark:bg-gray-800 px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                        <div class="sm:flex sm:items-start">
                            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                                <h3 class="text-xl font-semibold leading-6 text-gray-900 dark:text-white mb-4"
                                    id="modal-title">新增獎學金</h3>
                                <form id="add-scholarship-form" class="space-y-4">
                                    <div>
                                        <label
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300">獎學金名稱</label>
                                        <input type="text" name="name" required
                                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">金額
                                            (請輸入數字或文字)</label>
                                        <input type="text" name="amount" required placeholder="例如：20000 或 全額"
                                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border">
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">名額</label>
                                            <input type="number" name="quota" required
                                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border">
                                        </div>
                                        <div>
                                            <label
                                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">截止日期</label>
                                            <input type="date" name="deadline" required
                                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">負責單位
                                            (審查員)</label>
                                        <select name="provider_username" id="provider-select"
                                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border">
                                            <option value="">(預設：系統管理員)</option>
                                            <!-- JS will populate options -->
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">詳細說明
                                            (選填)</label>
                                        <textarea name="description" rows="3"
                                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white sm:text-sm p-2 border"></textarea>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700/50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                        <button type="button" onclick="submitAddForm()"
                            class="inline-flex w-full justify-center rounded-md bg-primary px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-600 sm:ml-3 sm:w-auto">新增</button>
                        <button type="button" onclick="closeAddModal()"
                            class="mt-3 inline-flex w-full justify-center rounded-md bg-white dark:bg-gray-800 px-3 py-2 text-sm font-semibold text-gray-900 dark:text-gray-300 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 sm:mt-0 sm:w-auto">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Global Scripts -->
    <script src="../global.js?v=1716300000"></script>
    <script src="js/scholarship-admin.js"></script>
    <script>
        let currentPage = 1;

        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('user');
            if (!storedUser) { window.location.href = '../login.html'; return; }
            const user = JSON.parse(storedUser);
            if (user.role !== 'system_admin' && user.role !== '系統管理員') {
                // alert('Access Denied'); window.location.href = '../index.html';
            }

            fetchScholarships(currentPage);
        });

        function fetchScholarships(page = 1) {
            currentPage = page;
            fetch(`../api/get_admin_scholarships.php?page=${page}&limit=6`)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('scholarship-table-body');
                    const paginationDiv = document.getElementById('pagination-controls');
                    tbody.innerHTML = '';

                    if (data.success && data.data.length > 0) {
                        data.data.forEach(item => {
                            const providerLabel = item.unit_name || item.provider_username || '-';
                            const desc = item.description || '';
                            const shortDesc = desc.length > 30 ? desc.substring(0, 30) + '…' : desc || '-';
                            const tr = document.createElement('tr');
                            tr.className = 'hover:bg-gray-50 dark:hover:bg-[#2a3441] transition-colors';
                            tr.innerHTML = `
                                <td class="p-4 text-sm font-medium text-gray-900 dark:text-white">${item.id}</td>
                                <td class="p-4 text-sm text-gray-900 dark:text-white font-bold">${item.name}</td>
                                <td class="p-4 text-sm text-gray-500 dark:text-gray-400">${item.amount}</td>
                                <td class="p-4 text-sm text-gray-500 dark:text-gray-400">${item.quota}</td>
                                <td class="p-4 text-sm text-gray-500 dark:text-gray-400">${providerLabel}</td>
                                <td class="p-4 text-sm text-gray-500 dark:text-gray-400" title="${desc.replace(/"/g, '&quot;')}">${shortDesc}</td>
                                <td class="p-4 text-sm text-gray-500 dark:text-gray-400">${item.application_end_date || item.deadline || '-'}</td>
                                <td class="p-4 text-right">
                                    <button onclick="deleteScholarship(${item.id})" class="text-red-500 hover:text-red-700 font-medium text-sm">刪除</button>
                                </td>
                            `;
                            tbody.appendChild(tr);
                        });

                        // Render Pagination
                        renderPagination(data.pagination, paginationDiv);

                    } else {
                        tbody.innerHTML = '<tr><td colspan="8" class="p-4 text-center text-gray-500">目前沒有獎學金項目</td></tr>';
                        paginationDiv.innerHTML = '';
                    }
                })
                .catch(err => console.error(err));
        }

        function renderPagination(pagination, container) {
            let html = '';
            const { current_page, total_pages } = pagination;

            // Prev Button
            if (current_page > 1) {
                html += `<button onclick="fetchScholarships(${current_page - 1})" class="px-3 py-1 rounded-md bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm transition-colors">上一頁</button>`;
            } else {
                html += `<button disabled class="px-3 py-1 rounded-md bg-gray-50 dark:bg-gray-800 text-gray-300 dark:text-gray-600 text-sm cursor-not-allowed">上一頁</button>`;
            }

            // Page Numbers
            for (let i = 1; i <= total_pages; i++) {
                if (i === current_page) {
                    html += `<button class="px-3 py-1 rounded-md bg-primary text-white text-sm font-bold shadow-sm">${i}</button>`;
                } else {
                    html += `<button onclick="fetchScholarships(${i})" class="px-3 py-1 rounded-md bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 text-sm transition-colors">${i}</button>`;
                }
            }

            // Next Button
            if (current_page < total_pages) {
                html += `<button onclick="fetchScholarships(${current_page + 1})" class="px-3 py-1 rounded-md bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm transition-colors">下一頁</button>`;
            } else {
                html += `<button disabled class="px-3 py-1 rounded-md bg-gray-50 dark:bg-gray-800 text-gray-300 dark:text-gray-600 text-sm cursor-not-allowed">下一頁</button>`;
            }

            container.innerHTML = html;
        }

        function openAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            fetchScholarshipUnits();
        }

        function fetchScholarshipUnits() {
            const select = document.getElementById('provider-select');
            if (!select) return;

            // Prevent multiple fetches if already populated (optional, but good)
            if (select.options.length > 1) return;

            fetch('../api/get_scholarship_units.php')
                .then(res => res.json())
                .then(result => {
                    if (result.success && result.data) {
                        select.innerHTML = '<option value="">(預設：系統管理員)</option>';
                        result.data.forEach(unit => {
                            const option = document.createElement('option');
                            option.value = unit.username;
                            option.textContent = `${unit.unit_name} (${unit.username})`;
                            select.appendChild(option);
                        });
                    }
                })
                .catch(err => console.error('Error fetching units:', err));
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function submitAddForm() {
            // alert('Debug: Button clicked'); // Uncomment if needed, but let's try to catch the error first
            const form = document.getElementById('add-scholarship-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            const fd = new FormData(form);

            fetch('../api/create_scholarship.php', {
                method: 'POST',
                body: fd
            })
                .then(async res => {
                    const text = await res.text();
                    try {
                        const data = JSON.parse(text);
                        if (data.success) {
                            alert('新增成功！');
                            closeAddModal();
                            form.reset();
                            fetchScholarships(1);
                        } else {
                            alert('新增失敗：' + data.message);
                        }
                    } catch (e) {
                        console.error('Server Text:', text);
                        alert('伺服器錯誤 (非 JSON 回傳)：\n' + text.substring(0, 200));
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('發生錯誤：' + err);
                });
        }

        function deleteScholarship(id) {
            if (!confirm('確定要刪除此獎學金嗎？此動作無法復原。')) return;

            fetch('../api/delete_scholarship.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'id=' + id
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        fetchScholarships(currentPage);
                    } else {
                        alert('刪除失敗：' + data.message);
                    }
                })
                .catch(err => console.error(err));
        }
    </script>
</body>

</html>
